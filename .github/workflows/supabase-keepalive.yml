name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 * * 3'   # Every Wednesday at 12:00 UTC
  workflow_dispatch:         # Manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/auth/v1/health"
