name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 * * 3'   # Every Wednesday at 12:00 UTC
  workflow_dispatch:         # Manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health
        run: |
          curl -sv "${{ secrets.SUPABASE_URL }}/auth/v1/health" || true
          curl -sv "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" || true
